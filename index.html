<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HMS QR Scanner</title>
  <!-- html5-qrcode 최신 CDN -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { 
      margin: 0; padding: 0; background: #0f172a; color: #f8fafc; 
      font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; 
    }
    .header { 
      padding: 15px; text-align: center; background: #1e293b; font-weight: bold; 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #reader-container { 
      flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000;
    }
    #reader { width: 100%; max-width: 600px; }
    .footer { padding: 20px; text-align: center; background: #1e293b; }
    button { 
      padding: 14px 24px; border-radius: 8px; border: none; 
      background: linear-gradient(135deg, #ef4444, #f59e0b); color: white; 
      font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px;
    }
    #loading { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      font-size: 16px; text-align: center; color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">📸 참가자 QR 스캔</div>
  
  <div id="reader-container">
    <div id="reader"></div>
    <div id="loading">카메라 권한을 확인 중입니다...</div>
  </div>
  
  <div class="footer">
    <button onclick="window.close()">❌ 취소 및 닫기</button>
  </div>

  <script>
    let html5QrcodeScanner;
    
    async function startCamera() {
      try {
        html5QrcodeScanner = new Html5Qrcode("reader");
        
        // 후면 카메라 고정 및 모바일 화면에 맞춘 qrbox 크기 조절 (화면 밖으로 나가면 스캔 안 됨)
        const config = { 
          fps: 10, 
          qrbox: 200, // 모바일에서 안정적인 크기
          aspectRatio: 1.0 
        };

        // 스캐너 시작 (자동으로 후면 카메라 및 권한 요청)
        await html5QrcodeScanner.start({ facingMode: "environment" }, config, (decodedText) => {
          html5QrcodeScanner.stop().catch(e => console.log("Stop error:", e));
          
          if (window.opener) {
            window.opener.postMessage({ type: 'qr_scanned', data: decodedText }, "*");
            setTimeout(() => window.close(), 500);
          } else {
            alert(`스캔 완료: ${decodedText}\n(연결된 GAS 창을 찾을 수 없어 자동 체크인이 불가능합니다. 창을 수동으로 닫아주세요.)`);
          }
        });
        
        document.getElementById('loading').style.display = 'none';
      } catch (err) {
        console.error("Camera error:", err);
        const errMsg = typeof err === 'string' ? err : (err.message || "알 수 없는 오류");
        document.getElementById('loading').innerHTML = 
          `<span style='color:#ef4444; font-weight:bold;'>카메라 시작 실패</span><br><br>
           <span style='font-size:12px; color:#f8fafc; opacity:0.8;'>오류 메시지: ${errMsg}</span><br><br>
           <span style='font-size:13px;'>* 로컬(PC)에서 HTML 파일을 더블클릭해서 열 경우 브라우저 보안 정책(file://)으로 인해 카메라가 차단될 수 있습니다.<br>Vercel에 배포(https://)한 뒤 테스트해주세요.</span>`;
      }
    }
    
    // 페이지 로드 시 즉시 카메라 시작 시도
    startCamera();
  </script>
</body>
</html>
